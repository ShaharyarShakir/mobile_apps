name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write  
jobs:
  build:
    name: Build & Upload APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --local

      - name: Find and Rename APK
        id: find_apk
        run: |
          APK_PATH=$(find . -name "*.apk" | head -1)
          VERSION=${{ github.ref_name }}
          mv "$APK_PATH" "emotions-${VERSION}.apk"
          echo "apk_path=${{ github.workspace }}/mobile/emotions-${VERSION}.apk" >> $GITHUB_OUTPUT

      - name: Create GitHub Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}